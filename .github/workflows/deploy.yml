name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to manually trigger the deployment from the GitHub Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recommended stable Node version for Angular 18+

      - name: Install dependencies
        run: npm ci # Uses 'npm ci' instead of 'install' for faster, more reliable builds on CI servers

      - name: Build Angular app
        # This will securely build your app using the production environments defined in angular.json
        run: npm run build -- --configuration production

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          
          # Angular's default build output folder matches your project project name "split-house"
          local-dir: ./dist/split-house/browser/ 
          
          # The remote directory on Hostinger where the files will be placed
          server-dir: /public_html/splithouse/
          protocol: ftps        # Add this
          port: 21     